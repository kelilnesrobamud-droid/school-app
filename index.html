<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የተማሪዎች መቆጣጠሪያ ሲስተም</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .input-field { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .primary-btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .primary-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="login-section" class="card">
            <h2>እንኳን ደህና መጡ</h2>
            <p>Student Control System</p>
            <input type="email" id="email" class="input-field" placeholder="ኢሜይል ያስገቡ">
            <input type="password" id="password" class="input-field" placeholder="ፓስወርድ ያስገቡ">
            <button id="login-btn" class="primary-btn">ግባ</button>
        </div>

        <div id="dashboard-section" class="card" style="display:none;">
            <h2>ዳሽቦርድ</h2>
            <p id="user-display"></p>
            <button id="logout-btn" style="background-color: #dc3545;" class="primary-btn">ውጣ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // በፎቶ 1000057886.jpg ላይ ያረጋገጥነው ትክክለኛው ቁልፍ
        const firebaseConfig = {
            apiKey: "AIzaSyBYfvuRAupj4_bDeaSJRMtpz_lohdd1XHM",
            authDomain: "school-app-945a1.firebaseapp.com",
            projectId: "school-app-945a1",
            storageBucket: "school-app-945a1.firebasestorage.app",
            messagingSenderId: "1074529168380",
            appId: "1:1074529168380:web:eb23f0ee65dd7770bca079"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("ስህተት፡ " + error.message);
            }
        };

        logoutBtn.onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = "none";
                document.getElementById('dashboard-section').style.display = "block";
                document.getElementById('user-display').innerText = "ገብተዋል፦ " + user.email;
            }
        });
    </script>
</body>
</html>
