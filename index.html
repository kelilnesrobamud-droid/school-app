
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ትምህርት ቤት አስተዳደር ሲስተም</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="login-section" class="card">
            <h2 class="title">እንኳን ደህና መጡ</h2>
            <p class="subtitle">እባክዎ ሚናዎን ይምረጡና ይግቡ</p>
            
            <select id="user-role" class="input-field">
                <option value="admin">አስተዳዳሪ (Admin)</option>
                <option value="teacher">አስተማሪ (Teacher)</option>
                <option value="parent">ወላጅ (Parent)</option>
            </select>

            <input type="email" id="email" class="input-field" placeholder="ኢሜይል">
            <input type="password" id="password" class="input-field" placeholder="ሚስጥራዊ ቁጥር">
            
            <button id="login-btn" class="primary-btn">ግባ</button>
        </div>

        <div id="dashboard-section" style="display:none;">
            <div class="header">
                <h2>የአስተዳዳሪ ገጽ</h2>
                <button id="logout-btn" class="logout-btn">ውጣ</button>
            </div>
            <div class="card">
                <h3>እንኳን በደህና መጡ!</h3>
                <p id="role-display"></p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
