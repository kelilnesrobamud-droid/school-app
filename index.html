<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>አል-አቅሷ ማድረሳ - መግቢያ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .error-msg { color: red; font-size: 13px; margin-top: 10px; display: none; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="login-card">
        <h2>አል-አቅሷ ማድረሳ</h2>
        <p>የተማሪዎች መቆጣጠሪያ ሲስተም</p>
        <div class="input-group">
            <label>ኢሜይል</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        <div class="input-group">
            <label>ፓስወርድ</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <button id="loginBtn">ግባ</button>
        <p id="error" class="error-msg"></p>
    </div>

    <div id="dashboard" class="login-card">
        <h2 style="color: green;">እንኳን ደህና መጡ!</h2>
        <p id="userEmail" style="font-weight: bold;"></p>
        <hr>
        <p>ሲስተሙ አሁን በትክክል ሰርቷል። አሁን የተማሪዎችን መረጃ ማስገባት እንችላለን።</p>
        <button onclick="location.reload()" style="background: #555;">ውጣ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // አንተ የላክኸው ትክክለኛው አዲሱ ኮንፊግ
        const firebaseConfig = {
            apiKey: "AIzaSyBYfvuRAupJ4_bDeaSJRMtpz_lohdd1XHM",
            authDomain: "school-app-945a1.firebaseapp.com",
            databaseURL: "https://school-app-945a1-default-rtdb.firebaseio.com",
            projectId: "school-app-945a1",
            storageBucket: "school-app-945a1.firebasestorage.app",
            messagingSenderId: "1074529168380",
            appId: "1:1074529168380:web:eb23f0ee65dd7770bca079",
            measurementId: "G-E191ECKYG8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('error');

        loginBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "እባክህ ኢሜይል እና ፓስወርድ አስገባ።";
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    errorMsg.style.display = "block";
                    // ስህተቱን በአማርኛ ለመግለጽ
                    if (error.code === 'auth/invalid-credential') {
                        errorMsg.innerText = "የተሳሳተ ኢሜይል ወይም ፓስወርድ!";
                    } else {
                        errorMsg.innerText = "ስህተት፡ " + error.message;
                    }
                });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                document.getElementById('userEmail').innerText = user.email;
            }
        });
    </script>
</body>
</html>
